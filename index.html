<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/bundle.css">
    <title>under construction</title>
    <script data-site="FXTTJPBQ" defer src="https://cdn.usefathom.com/script.js"></script>
  </head>
  <body>
    <main class="ibm-plex-mono-light">
    <article id="terminal">
        <p>Wayfarer ANS v1.83.0-alpha</p>
    </article>
    <div class="terminal-spinner">&gt; </div>
</main>
<link rel="stylesheet" href="/styles/terminal.css">
<script>
    const lines = [
        { text: "(C)2197 Aleph Intelligences" },
        { text: "Main Processor: SOME FICTIONAL JUNK" },
        { text: "Memory: A BUNCH" },
        { text: "Initializing star maps", loading: true },
        { text: "Initializing ion drives", loading: true },
        { text: "Initializing command interface", indefinite: true }
    ]
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function eventLoop() {
        const terminal = document.getElementById("terminal")
        function addLine(line) {
            var html = "<p"
            if (line.loading) {
                html += " class='loading'"
            } else if (line.indefinite) {
                html += " class='indefinite'"
            }
            html += `>${line.text}</p>`
            terminal.insertAdjacentHTML("beforeend", html)
        }

        for (const line of lines) {
            await sleep(1000)
            addLine(line)
            if (line.loading) await sleep(2000)
        }
    }

    document.addEventListener("DOMContentLoaded", eventLoop);
</script>

  </body>
</html>
